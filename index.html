<!DOCTYPE html>
<html>
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burn Miku™</title>
    <link rel="icon" href="./images/icon.png" type="image/png">
    <style> 
        body {
            background-color: #fa6e8f;
        }

        h1 {
            color: white;
            text-align: center;
        }

        p {
            color: white;
        }

        .burning {
            place-items: center;
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: 1fr;
            padding-bottom: 500000px;
            box-sizing: border-box; 
            height:400px;
        }

        .miku {
            grid-column: 1;
            grid-row: 1;
        }

        .fire {
            grid-column:1;
            grid-row: 1;
            z-index: 2;
        }

    </style>
 </head>
<body>
    <h1>BURN MIKU</h1>
    <p>hello, support the burn miku movement! This is a strictly anti-miku movement where we want to burn miku and co</p>
    <div class="burning">
        <img class="miku" src="./images/miku-plush.gif">
        <img class="fire" src="./images/firegif.gif">
    </div>
</body>
</html>
